<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Cosecha - CUADERNO DE CAMPO</title>
    <link rel="stylesheet" href="style.css"> 
    <!-- Librerías para exportación real a Excel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
</head>
<body>

    <nav class="contenedor-header">
        <div class="bloque-marca">
            <img src="img/logo.png" class="logo" alt="Logo">
            <h1 class="titulo">MASÍA CENTENARIA FAMILIAR</h1>
        </div>
        <div class="menu-enlaces">
            <a href="index.html" class="enlace-menu">INICIO</a>
            <a href="registro.html" class="enlace-menu" style="color: #b58d3d;">PARADAS</a>
            <a href="totales.html" class="enlace-menu">TOTAL KILOS</a>
            <a href="fitosanitario.html" class="enlace-menu">FITOSANITARIOS</a>
        </div>
    </nav>

    <main class="seccion-datos">
        <div class="cabecera-seccion">
            <h2 id="añoDinamico">REGISTRO DE COSECHA DIARIA</h2>
            <div>
                <label id="opcionAño" for="selectorAño">Año Activo:</label>
                <select id="selectorAño"></select>
            </div>
        </div>

        <div class="contenedor-formulario">
            <h3>NUEVO PESO DE COSECHA</h3>
            <form class="formulario-cosecha">
                <div class="grupo-input">
                    <label for="parada">Seleccionar Parada:</label>
                    <select id="parada" required>
                        <option value="" disabled selected>-- Elige una parada --</option>
                        <option value="JOVE">JOVE</option>
                        <option value="VIÑETA">VIÑETA</option>
                        <option value="TIRAS">TIRAS</option>
                        <option value="GRANJA">GRANJA</option>
                        <option value="HUERTA">HUERTA</option>
                        <option value="CAMINO">CAMINO</option>
                        <option value="PEREMATA">PEREMATA</option>
                    </select>
                </div>
                <div class="grupo-input">
                    <label for="kilos">Kilos Pesados:</label>
                    <input type="number" id="kilos" placeholder="Ej: 1250" min="0" required>
                </div>
                <div class="grupo-input">
                    <label for="fecha">Fecha de Recogida:</label>
                    <input type="date" id="fecha" required>
                </div>
                <div style="display: flex; gap: 10px; align-items: flex-end; justify-content: center; margin-top: 20px; width: 100%;">
                    <button type="submit" class="btn-primario">REGISTRAR DATOS</button>
                    <button type="button" class="btn-primario" id="btn-imprimir-paradas" style="background-color: #2c3e2f;" onclick="window.print()">IMPRIMIR</button>
                    <button type="button" class="btn-primario" id="btn-excel-paradas" style="background-color: #27ae60;" onclick="descargarExcelParadasPremium(document.getElementById('selectorAño'))">DESCARGAR EXCEL</button>
                </div>
            </form>
        </div>

        <table class="tabla-datos">
            <thead>
                <tr>
                    <th>Fecha</th>
                    <th>Parada Exacta</th>
                    <th>Kilos Pesados</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </main>

    <script src="script.js"></script>
    <script src="estilo_excel.js"></script>
</body>
</html>

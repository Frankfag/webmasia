<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Cosecha - CUADERNO DE CAMPO</title>
    <link rel="stylesheet" href="style.css"> 
    <!-- Librerías para exportación real a Excel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
</head>
<body>

    <nav class="contenedor-header">
        <div class="bloque-marca">
            <img src="img/logo.png" class="logo" alt="Logo">
            <h1 class="titulo">MASÍA CENTENARIA FAMILIAR</h1>
        </div>
        <div class="menu-enlaces">
            <a href="index.html" class="enlace-menu">INICIO</a>
            <a href="registro.html" class="enlace-menu">PARADAS</a>
            <a href="totales.html" class="enlace-menu" style="color: #b58d3d;">TOTAL KILOS</a>
            <a href="fitosanitario.html" class="enlace-menu">FITOSANITARIOS</a>
        </div>
    </nav>

    <main class="seccion-datos">
        <div class="cabecera-seccion">
            <h2>INFORME GENERAL DE KILOS</h2>
            <div>
                <label id="opcionAño" for="selectorAño">Año Activo:</label>
                <select id="selectorAño"></select>
            </div>
        </div>

        <div class="contenedor-tarjetas">
            <div class="tarjeta-kilos"><h4>Total Seleccionado</h4><p class="cifra-kilos" id="total-kilos-suma">0 kg</p></div>
            <div class="tarjeta-kilos destacado" style="border-left: 5px solid #b58d3d;"><h4>Mayor Entrega</h4><p class="cifra-kilos" id="mayor-entrega">0 kg</p></div>
            <div class="tarjeta-kilos"><h4>Total Entregas</h4><p class="cifra-kilos" id="total-registros">0 registros</p></div>
        </div>

        <div class="contenedor-formulario">
            <h3>FILTRAR INFORME DE COSECHA</h3>
            <div class="formulario-cosecha">
                <div class="grupo-input">
                    <label for="filtro-parada">Ver registros de:</label>
                    <select id="filtro-parada">
                        <option value="TODAS">-- Todas las paradas --</option>
                        <option value="JOVE">JOVE</option>
                        <option value="VIÑETA">VIÑETA</option>
                        <option value="TIRAS">TIRAS</option>
                        <option value="GRANJA">GRANJA</option>
                        <option value="HUERTA">HUERTA</option>
                        <option value="CAMINO">CAMINO</option>
                        <option value="PEREMATA">PEREMATA</option>
                    </select>
                </div>
                <div style="display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap;">
                    <button class="btn-primario" id="btn-filtrar" style="height: 41px; background-color: #2c3e2f;">FILTRAR</button>
                    <button class="btn-primario" id="btn-vista-agrupada" style="height: 41px; background-color: #b58d3d;">AGRUPADA</button>
                    <button class="btn-primario" id="btn-vista-detallada" style="height: 41px; background-color: #7f8c8d;">DETALLADA</button>
                    <button type="button" class="btn-primario" id="btn-excel" style="height: 41px; background-color: #27ae60;" onclick="descargarExcelTotalesPremium(document.getElementById('selectorAño'), document.getElementById('filtro-parada'), typeof modoVista !== 'undefined' ? modoVista : 'agrupada')">DESCARGAR EXCEL</button>
                    <button class="btn-primario" id="btn-reiniciar" style="height: 41px; background-color: #e74c3c;">REINICIAR MEMORIA</button>
                </div>
            </div>
        </div>

        <table class="tabla-datos">
            <thead><tr><th>Fecha</th><th>Parada</th><th>Kilos Netos</th><th>Acciones</th></tr></thead>
            <tbody></tbody>
        </table>
    </main>

    <script src="script.js"></script>
    <script src="estilo_totales.js"></script>
</body>
</html>

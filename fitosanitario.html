<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tratamientos Fitosanitarios - MASÍA CENTENARIA</title>
    <link rel="stylesheet" href="style.css"> 
    

<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>


    <style>
        /* Estilo rápido para asegurar que el formulario sea responsive */
        .grid-formulario {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        @media (max-width: 600px) {
            .grupo-botones { flex-direction: column; }
            .btn-primario { width: 100%; margin-bottom: 5px; }
        }
    </style>
</head>
<body>

    <nav class="contenedor-header">
        <div class="bloque-marca">
            <img src="img/logo.png" class="logo" alt="Logo">
            <h1 class="titulo">MASÍA CENTENARIA FAMILIAR</h1>
        </div>
        <div class="menu-enlaces">
            <a href="index.html" class="enlace-menu">INICIO</a>
            <a href="registro.html" class="enlace-menu">PARADAS</a>
            <a href="totales.html" class="enlace-menu">TOTAL KILOS</a>
            <a href="fitosanitario.html" class="enlace-menu" style="color: #b58d3d;">FITOSANITARIOS</a>
        </div>
    </nav>

    <main class="seccion-datos">
        <div class="cabecera-seccion">
            <h2>TRATAMIENTOS FITOSANITARIOS</h2>
            <select id="selectorAño"></select>
        </div>

        <div class="contenedor-formulario">
            <form id="formulario-fito">
                <div class="grid-formulario">
                    <div class="grupo-input"><label>Fecha:</label><input type="date" id="fito-fecha" required></div>
                    <div class="grupo-input"><label>Parada:</label><select id="fito-parada" required>
                        <option value="JOVE">JOVE</option><option value="VIÑETA">VIÑETA</option>
                        <option value="TIRAS">TIRAS</option><option value="GRANJA">GRANJA</option>
                    </select></div>
                    <div class="grupo-input"><label>Producto:</label><input type="text" id="fito-producto" required></div>
                    <div class="grupo-input"><label>Dosis:</label><input type="text" id="fito-dosis"></div>
                    <div class="grupo-input"><label>Nº Registro:</label><input type="text" id="fito-registro"></div>
                    <div class="grupo-input"><label>Plazo:</label><input type="number" id="fito-plazo"></div>
                    <div class="grupo-input"><label>Operario:</label><input type="text" id="fito-operario"></div>
                    <div class="grupo-input"><label>Nº Carnet:</label><input type="text" id="fito-carnet"></div>
                    <div class="grupo-input"><label>Equipo:</label><input type="text" id="fito-equipo"></div>
                    <div class="grupo-input"><label>Nº ROMA:</label><input type="text" id="fito-roma"></div>
                </div>
                
               <div class="grupo-botones">
    <button type="submit" class="btn-primario" style="background-color: #b58d3d;">GUARDAR TRATAMIENTO</button>
    
    <button type="button" class="btn-primario" style="background-color: #2c3e2f;" onclick="window.print()">IMPRIMIR</button>
    
    <button type="button" class="btn-primario" style="background-color: #27ae60;" onclick="bajarExcelFitoOficial(document.getElementById('selectorAño'))">DESCARGAR EXCEL</button>
</div>
            </form>
        </div>

        <div class="table-responsive">
            <table class="tabla-datos" id="tabla-fito">
                <thead>
                    <tr><th>Fecha</th><th>Parada</th><th>Producto</th><th>Operario</th><th>Acción</th></tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </main>

    <script src="estilo_excel.js"></script>
<script src="script.js"></script>

    
</body>
</html>
